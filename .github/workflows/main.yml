name: Deploy to Conoha

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4

    - name: Create SSH config and known_hosts
      env:
        SSH_USER: root
        SSH_HOST: 133.130.102.77
        SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      run: |
        mkdir -p ~/.ssh
        echo "HOST=$SSH_HOST" > ~/.ssh/config
        echo "  User $SSH_USER" >> ~/.ssh/config
        echo "  StrictHostKeyChecking no" >> ~/.ssh/config
        
    - name: Install sshpass
      run: sudo apt-get install -y sshpass

    - name: Deploy to Conoha
      env:
        SSH_HOST: 133.130.102.77
        SSH_USER: root
        SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        TARGET: /var/www/kabu_ai
      run: |
        echo "Syncing files to server"
        export SSHPASS=$SSH_PASSWORD
        sshpass -e rsync -avz --delete-after \
          . \
          --exclude '.git' \
          --exclude 'node_modules' \
          --exclude '.next' \
          --exclude '.env' \
          --exclude '.env.*' \
          $SSH_USER@$SSH_HOST:$TARGET

        echo "rsync command completed"
        echo "Executing deployment commands"
        sshpass -e ssh $SSH_USER@$SSH_HOST << EOF
          set -e
          cd $TARGET
          
          # 既存のプロセスを停止
          echo "Stopping existing processes..."
          pm2 stop kabu_ai || true
          pm2 delete kabu_ai || true
          
          # ポート3000を使用しているプロセスを確認して停止
          if lsof -i :3000 > /dev/null 2>&1; then
            echo "Killing process using port 3000..."
            lsof -i :3000 | grep LISTEN | awk '{print $2}' | xargs kill -9 || true
            sleep 2
          fi
          
          # キャッシュのクリア
          echo "Clearing cache..."
          rm -rf .next/cache
          rm -rf .next/static
          pm2 flush
          
          # 依存関係のインストールとビルド
          echo "Installing dependencies and building..."
          npm install
          npm run build
          
          # アプリケーションの起動
          echo "Starting application..."
          NODE_ENV=production PORT=3000 pm2 start npm --name "kabu_ai" -- start
          pm2 save
          
          # デプロイの確認
          echo "Verifying deployment..."
          sleep 5
          pm2 list
          ls -la $TARGET/app/admin/comment/
          
          # ポート3000の状態確認
          echo "Checking port 3000 status..."
          lsof -i :3000 || echo "Port 3000 is free"
        EOF