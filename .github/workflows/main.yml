name: Deploy to Conoha

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass & lsof
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass lsof

      - name: Add SSH known_hosts
        env:
          SSH_HOST: 133.130.102.77
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

      - name: Sync and remote deploy
        env:
          SSH_USER: root
          SSH_HOST: 133.130.102.77
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          TARGET: /var/www/kabu_ai
        run: |
          export SSHPASS=$SSH_PASSWORD

          echo "Syncing files..."
          sshpass -e rsync -avz --delete \
            . \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env*' \
            --exclude='public/uploads' \
            $SSH_USER@$SSH_HOST:$TARGET

          echo "Running remote commands..."
          sshpass -e ssh $SSH_USER@$SSH_HOST << EOF
            set -e

            # 必ず正しいディレクトリへ移動
            cd $TARGET

            # アップロードディレクトリの作成と権限設定（存在しない場合のみ）
            if [ ! -d "public/uploads/post_images" ]; then
              mkdir -p public/uploads/post_images
              chmod -R 777 public/uploads
            fi

            # ポート3000を使っているプロセスを強制終了
            sudo lsof -ti:3000 | xargs -r sudo kill -9 || true

            # 既存の PM2 プロセスを停止・削除
            pm2 stop kabu_ai || true
            pm2 delete kabu_ai || true

            # キャッシュ削除、依存再インストール、ビルド
            rm -rf .next
            npm ci
            npm run build

            # publicディレクトリの設定
            mkdir -p .next/standalone/public
            cp -r public/* .next/standalone/public/
            # uploadsディレクトリをシンボリックリンクで置き換え
            rm -rf .next/standalone/public/uploads
            ln -sf /var/www/kabu_ai/public/uploads .next/standalone/public/uploads
            chmod -R 755 .next/standalone/public

            # PM2 で新規起動し、リストを保存
            NODE_ENV=production PORT=3000 pm2 start npm --name "kabu_ai" -- start --max-memory-restart 1G
            pm2 save

            # 確認
            sleep 5
            netstat -tulpn | grep :3000
            pm2 list
          EOF