name: Deploy to Conoha

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit --skipLibCheck

      - name: ESLint check
        run: npm run lint

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass & lsof
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass lsof

      - name: Add SSH known_hosts
        env:
          SSH_HOST: 133.130.102.77
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

      - name: Sync and remote deploy
        env:
          SSH_USER: root
          SSH_HOST: 133.130.102.77
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          TARGET: /var/www/kabu_ai
        run: |
          export SSHPASS=$SSH_PASSWORD

          echo "Syncing files..."
          sshpass -e rsync -avz --delete \
            . \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env*' \
            --exclude='public/uploads' \
            $SSH_USER@$SSH_HOST:$TARGET

          echo "Syncing uploads directory..."
          sshpass -e rsync -avz \
            public/uploads/ \
            $SSH_USER@$SSH_HOST:$TARGET/public/uploads/

          echo "Running remote commands..."
          sshpass -e ssh $SSH_USER@$SSH_HOST << EOF
            set +e  # Continue on error to prevent blocking

            # 必ず正しいディレクトリへ移動
            cd $TARGET

            # アップロードディレクトリの作成と権限設定（存在しない場合のみ）
            if [ ! -d "public/uploads/post_images" ]; then
              mkdir -p public/uploads/post_images
              chmod -R 777 public/uploads
            fi

            # ポート3000を使っているプロセスを強制終了
            sudo lsof -ti:3000 | xargs -r sudo kill -9 || true

            # 既存の PM2 プロセスを停止・削除
            pm2 stop kabu_ai || true
            pm2 delete kabu_ai || true

            # キャッシュ削除、依存再インストール
            rm -rf .next
            npm ci || echo "npm install failed, continuing..."
            
            # ビルド実行（TypeScriptとESLintチェックは既に完了済み）
            set -e
            echo "Building application..."
            npm run build
            set +e  # 以降のエラーでは停止しない

            # Chrome/Chromiumのインストール（重要）
            echo "Installing Chrome for Selenium..."
            wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
            echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
            sudo apt update
            sudo apt install -y google-chrome-stable
            
            # Chrome binary pathを環境変数に設定
            export CHROME_BINARY_PATH=/usr/bin/google-chrome-stable
            echo "export CHROME_BINARY_PATH=/usr/bin/google-chrome-stable" >> ~/.bashrc
            
            # Chromeのインストール確認
            which google-chrome-stable
            google-chrome-stable --version

            # Python仮想環境のセットアップ
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            # publicディレクトリの設定
            mkdir -p .next/standalone/public
            cp -r public/* .next/standalone/public/
            
            # uploadsディレクトリの設定を改善
            rm -rf .next/standalone/public/uploads
            mkdir -p /var/www/kabu_ai/public/uploads
            ln -sf /var/www/kabu_ai/public/uploads .next/standalone/public/uploads

            # アップロードディレクトリの所有者とパーミッションを設定
            chown -R root:root /var/www/kabu_ai/public
            chmod -R 755 /var/www/kabu_ai/public
            find /var/www/kabu_ai/public -type d -exec chmod 755 {} \;
            find /var/www/kabu_ai/public -type f -exec chmod 644 {} \;
            
            # 画像ファイルのMIMEタイプを正しく設定
            find /var/www/kabu_ai/public/uploads -name "*.png" -exec file {} \; | grep -v "PNG image" | cut -d: -f1 | while read f; do
              echo "Fixing MIME type for: $f"
              # 破損した画像ファイルを特定して修正
            done

            # シンボリックリンクの確認
            ls -la .next/standalone/public/uploads
            ls -la public/uploads

            # PM2 で新規起動し、リストを保存
            NODE_ENV=production PORT=3000 pm2 start npm --name "kabu_ai" -- start --max-memory-restart 1G || echo "PM2 start failed, attempting restart..."
            pm2 restart kabu_ai || echo "PM2 restart failed, attempting force restart..."
            pm2 save || echo "PM2 save failed, continuing..."

            # 確認
            sleep 5
            netstat -tulpn | grep :3000 || echo "Port 3000 check failed"
            pm2 list || echo "PM2 list failed"
            
            echo "Deployment completed - system will continue running even if some steps failed"
          EOF