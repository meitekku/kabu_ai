name: Deploy to Conoha

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit --skipLibCheck

      - name: ESLint check
        run: npm run lint

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 133.130.102.77 >> ~/.ssh/known_hosts

      - name: Sync files to staging directory
        env:
          SSH_USER: root
          SSH_HOST: 133.130.102.77
        run: |
          echo "Syncing files to staging directory..."
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            . \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env*' \
            --exclude='public/uploads' \
            --exclude='venv' \
            $SSH_USER@$SSH_HOST:/var/www/kabu_ai_staging

          echo "Syncing uploads to persistent directory..."
          rsync -avz \
            -e "ssh -i ~/.ssh/id_rsa" \
            public/uploads/ \
            $SSH_USER@$SSH_HOST:/var/www/kabu_ai_uploads/

      - name: Build in staging and zero-downtime swap
        env:
          SSH_USER: root
          SSH_HOST: 133.130.102.77
        run: |
          ssh -i ~/.ssh/id_rsa $SSH_USER@$SSH_HOST << 'DEPLOY_EOF'
            set -e

            STAGING=/var/www/kabu_ai_staging
            PRODUCTION=/var/www/kabu_ai
            OLD=/var/www/kabu_ai_old
            UPLOADS=/var/www/kabu_ai_uploads

            echo "=== Zero-downtime deploy start ==="

            # --- 永続uploadsディレクトリの初期化 ---
            mkdir -p "$UPLOADS/post_images"

            # 初回のみ: 既存uploadsを永続ディレクトリに移行
            if [ -d "$PRODUCTION/public/uploads" ] && [ ! -L "$PRODUCTION/public/uploads" ]; then
              echo "Migrating uploads to persistent directory..."
              cp -a "$PRODUCTION/public/uploads/"* "$UPLOADS/" 2>/dev/null || true
            fi

            # --- ステージング環境の準備 ---
            # .env.localをコピー
            if [ -f "$PRODUCTION/.env.local" ]; then
              cp "$PRODUCTION/.env.local" "$STAGING/.env.local"
            fi

            # Python venvを再利用（コピー）
            if [ -d "$PRODUCTION/venv" ] && [ ! -d "$STAGING/venv" ]; then
              echo "Reusing Python venv..."
              cp -a "$PRODUCTION/venv" "$STAGING/venv"
            fi

            # --- ステージングでビルド（本番は稼働中） ---
            cd "$STAGING"

            # ビルド用に空のuploadsディレクトリを作成（symlinkはNG: Turbopackが処理できない）
            mkdir -p public/uploads

            echo "Installing Node.js dependencies..."
            npm ci

            echo "Building application..."
            npm run build

            # --- ビルド後のセットアップ ---
            # uploadsは永続ディレクトリへのシンボリックリンク（standaloneのみ）
            rm -rf .next/standalone/public/uploads
            ln -sf "$UPLOADS" .next/standalone/public/uploads

            # uploadsのパーミッション設定
            chown -R root:root "$UPLOADS"
            find "$UPLOADS" -type d -exec chmod 755 {} \;
            find "$UPLOADS" -type f -exec chmod 644 {} \;

            # --- Chrome（未インストールの場合のみ） ---
            if ! command -v google-chrome-stable &>/dev/null; then
              echo "Installing Chrome..."
              wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | apt-key add -
              echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | tee /etc/apt/sources.list.d/google-chrome.list
              apt-get update -qq && apt-get install -y -qq google-chrome-stable
            else
              echo "Chrome already installed: $(google-chrome-stable --version)"
            fi

            # --- Python venv更新 ---
            if [ -f "requirements.txt" ]; then
              if [ ! -d "venv" ]; then
                python3 -m venv venv --copies
              fi
              source venv/bin/activate
              pip install --upgrade pip -q
              pip install -r requirements.txt -q
              deactivate
            fi

            # === アトミックスワップ ===
            echo "Swapping directories..."
            rm -rf "$OLD"

            if [ -d "$PRODUCTION" ]; then
              mv "$PRODUCTION" "$OLD"
            fi
            mv "$STAGING" "$PRODUCTION"

            # === PM2再起動（ダウンタイムはここだけ ~2-3秒） ===
            cd "$PRODUCTION"
            export NODE_ENV=production
            export PORT=3000
            export CHROME_BINARY_PATH=/usr/bin/google-chrome-stable

            if pm2 describe kabu_ai > /dev/null 2>&1; then
              echo "Restarting PM2 process (downtime: ~2-3s)..."
              pm2 restart kabu_ai --update-env
            else
              echo "Starting new PM2 process..."
              pm2 start npm --name "kabu_ai" -- start --max-memory-restart 1G
            fi
            pm2 save

            # --- クリーンアップ ---
            rm -rf "$OLD"

            # --- 確認 ---
            echo "=== Deploy verification ==="
            sleep 3
            pm2 list
            netstat -tulpn | grep :3000 || echo "Warning: Port 3000 not yet listening"
            echo "=== Zero-downtime deploy complete ==="
          DEPLOY_EOF
