name: Deploy to Conoha

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # ソースコードをチェックアウト
      - uses: actions/checkout@v4

      # sshpass と lsof をまとめてインストール
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass lsof

      # SSH の known_hosts にサーバーを登録
      - name: Add SSH known_hosts
        env:
          SSH_HOST: 133.130.102.77
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

      # ファイル同期とリモートデプロイ
      - name: Sync code and deploy
        env:
          SSH_USER: root
          SSH_HOST: 133.130.102.77
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          TARGET: /var/www/kabu_ai
        run: |
          export SSHPASS=$SSH_PASSWORD

          echo "Syncing files to server..."
          sshpass -e rsync -avz --delete \
            . \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env*' \
            $SSH_USER@$SSH_HOST:$TARGET

          echo "Starting remote deployment..."
          sshpass -e ssh $SSH_USER@$SSH_HOST << 'EOF'
            set -e
            cd $TARGET

            # ポート3000を使うプロセスを強制終了
            sudo lsof -ti:3000 | xargs -r sudo kill -9 || true

            # 既存の PM2 プロセスを止めて削除
            pm2 stop kabu_ai || true
            pm2 delete kabu_ai || true

            # キャッシュ削除＆ビルド
            rm -rf .next
            npm ci
            npm run build

            # PM2 で起動→保存
            NODE_ENV=production PORT=3000 pm2 start npm --name "kabu_ai" -- start --max-memory-restart 1G
            pm2 save

            # 動作確認
            sleep 5
            netstat -tulpn | grep :3000
            pm2 list
          EOF