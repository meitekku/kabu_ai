name: Deploy to Conoha

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4

    - name: Create SSH config and known_hosts
      env:
        SSH_USER: root
        SSH_HOST: 133.130.102.77
        SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      run: |
        mkdir -p ~/.ssh
        echo "HOST=$SSH_HOST" > ~/.ssh/config
        echo "  User $SSH_USER" >> ~/.ssh/config
        echo "  StrictHostKeyChecking no" >> ~/.ssh/config
        
    - name: Install sshpass
      run: sudo apt-get install -y sshpass

    - name: Deploy to Conoha
      env:
        SSH_HOST: 133.130.102.77
        SSH_USER: root
        SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        TARGET: /var/www/kabu_ai
      run: |
        echo "Syncing files to server"
        export SSHPASS=$SSH_PASSWORD
        sshpass -e rsync -avz --delete-after \
          . \
          --exclude '.git' \
          --exclude 'node_modules' \
          --exclude '.next' \
          --exclude '.env' \
          --exclude '.env.*' \
          $SSH_USER@$SSH_HOST:$TARGET

        echo "rsync command completed"
        echo "Executing deployment commands"
        sshpass -e ssh $SSH_USER@$SSH_HOST << EOF
          set -e
          cd $TARGET
          npm install
          npm run build
          pm2 delete kabu_ai || true
          rm -rf .next/cache
          rm -rf .next/static
          pm2 flush
          # Vercelのキャッシュをクリア
          curl -X POST "https://api.vercel.com/v1/deployments/$(git rev-parse HEAD)/clear-cache" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json"
          NODE_ENV=production PORT=3000 pm2 start npm --name "kabu_ai" -- start
          pm2 save
          pm2 reload kabu_ai
          echo "Production deployment completed"
          echo "Verifying deployment..."
          pm2 list
          ls -la $TARGET/app/admin/comment/
        EOF